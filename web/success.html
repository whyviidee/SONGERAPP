<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONGER — Configurado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #161616;
      border: 1px solid #1db95440;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .check {
      width: 64px;
      height: 64px;
      background: #1db95420;
      border: 2px solid #1db954;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    p strong { color: #e0e0e0; }

    .btn {
      display: inline-block;
      background: #1db954;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      letter-spacing: 0.5px;
    }

    .btn:hover { background: #22c95e; }

    .note {
      font-size: 11px;
      color: #444;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h2>Tudo configurado!</h2>
    <p>
      O Spotify está ligado e o token foi guardado.<br>
      <strong>Abre a app SONGER</strong> — já está pronto a usar.
    </p>
    <a href="/" class="btn">Voltar ao Setup</a>
    <p class="note">Podes fechar este tab e o terminal quando quiseres.</p>
  </div>
</body>
</html>
